<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rommy.blog</title>
    <meta
      name="description"
      content="Short notes and longer essays."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="alternate"
      type="application/atom+xml"
      title="rommy.blog (Atom)"
      href="feed.xml"
    />
  </head>
  <body>
    <main>
      <h1 class="site-title">rommy.blog</h1>
      <hr class="hr" />
      <p class="lead">Short notes and longer essays.</p>

      <section aria-labelledby="posts-heading">
        <h2 id="posts-heading">Writing</h2>
        <ol class="post-list" reversed>
          <li>
            <span class="post-date">2026-04-26</span>
            <a href="posts/vibes-coded.html">Vibes...coded.</a>
          </li>
          <li>
            <span class="post-date">2026-04-26</span>
            <a href="posts/hello-from-cursor.html">Hello from Cursor</a>
          </li>
        </ol>
      </section>

      <section aria-labelledby="links-heading">
        <h2 id="links-heading">Elsewhere</h2>
        <ul class="link-list">
          <li>
            <a href="https://farcaster.xyz/fingerguns" rel="me noopener" target="_blank">Farcaster</a>
          </li>
          <li>
            <a href="http://github.com/fingerguns" rel="me noopener" target="_blank">GitHub</a>
          </li>
        </ul>
      </section>

      <footer class="site-footer">
        <p>
          Subscribe via
          <a href="feed.xml" type="application/atom+xml">Atom feed</a>
          (add <code>feed.xml</code> to your reader).
        </p>
      </footer>

      <section class="colophon" aria-label="Colophon">
        <p>Built as static files. No trackers.</p>
      </section>
    </main>
    <script>
      for (const a of document.querySelectorAll('a[href]')) {
        const href = a.getAttribute('href') || '';
        if (href.startsWith('#')) continue;
        a.target = '_blank';
        const rel = (a.getAttribute('rel') || '').split(/\s+/).filter(Boolean);
        for (const token of ['noopener', 'noreferrer']) {
          if (!rel.includes(token)) rel.push(token);
        }
        a.setAttribute('rel', rel.join(' ').trim());
      }
    </script>
  </body>
</html>
